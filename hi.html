<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillSync AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,1,0" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            brand: { 50:"#eef3ff",100:"#dbe7ff",300:"#8dacff",500:"#4367f0",700:"#2138a3",900:"#111936" },
            accent: { 200:"#ddccff",500:"#8057f8" }
          },
          fontFamily: {
            heading: ["Manrope", "sans-serif"],
            body: ["Space Grotesk", "sans-serif"]
          }
        }
      }
    };
  </script>
  <style>
    body {
      font-family: "Space Grotesk", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(67,103,240,.16), transparent 26%),
        radial-gradient(circle at top right, rgba(128,87,248,.16), transparent 24%),
        linear-gradient(180deg, #f8fbff 0%, #eef3ff 50%, #f8fbff 100%);
    }
    .dark body {
      background:
        radial-gradient(circle at top left, rgba(67,103,240,.20), transparent 22%),
        radial-gradient(circle at top right, rgba(128,87,248,.18), transparent 22%),
        linear-gradient(180deg, #0f172a 0%, #111827 55%, #0f172a 100%);
    }
    .glass { backdrop-filter: blur(18px); background: rgba(255,255,255,.72); }
    .dark .glass { background: rgba(15,23,42,.74); }
  </style>
</head>
<body class="min-h-screen text-slate-900 dark:text-white">
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const nav = [
      ["home", "Home", "home"],
      ["dashboard", "Dashboard", "dashboard"],
      ["tests", "Tests", "quiz"],
      ["projects", "Projects", "workspaces"],
      ["jobs", "Jobs", "business_center"],
      ["profile", "Profile", "person"]
    ];

    const story = [
      "User signs up...",
      "AI suggests a career...",
      "User picks a real company project...",
      "Completes it and earns...",
      "Portfolio is built automatically...",
      "Companies can now hire directly..."
    ];

    const projects = [
      { title: "Sales Dashboard", desc: "Build a KPI view for a startup team.", budget: "$220", skill: "React", category: "Frontend", difficulty: "Intermediate" },
      { title: "Churn Predictor", desc: "Train a simple model and explain insights.", budget: "$340", skill: "Python", category: "AI", difficulty: "Advanced" },
      { title: "UX Audit", desc: "Improve onboarding flow with redesign notes.", budget: "$160", skill: "Research", category: "Design", difficulty: "Beginner" }
    ];

    const jobs = [
      { title: "Junior Data Analyst", company: "Nova Metrics", match: 96 },
      { title: "Frontend Engineer I", company: "FlowGrid", match: 91 },
      { title: "ML Intern", company: "Verve AI", match: 84 }
    ];

    const quiz = [
      { q: "Which task best matches analytical thinking?", a: ["Reviewing sales trends", "Choosing a logo color", "Planning a party", "Writing a slogan"], ok: 0 },
      { q: "Which skill best fits frontend work?", a: ["Cold calling", "Responsive interface building", "Payroll filing", "Stock counting"], ok: 1 },
      { q: "What matters most in a project brief?", a: ["Scope and outcome", "Desk color", "Profile photo", "Parking slot"], ok: 0 }
    ];

    function App() {
      const [page, setPage] = useState("home");
      const [dark, setDark] = useState(false);
      const [flowIndex, setFlowIndex] = useState(0);
      const [qIndex, setQIndex] = useState(0);
      const [answers, setAnswers] = useState({});
      const [submitted, setSubmitted] = useState(false);
      const [time, setTime] = useState(540);
      const [category, setCategory] = useState("All");
      const [difficulty, setDifficulty] = useState("All");

      useEffect(() => document.documentElement.classList.toggle("dark", dark), [dark]);
      useEffect(() => {
        const id = setInterval(() => setFlowIndex((i) => (i + 1) % story.length), 2200);
        return () => clearInterval(id);
      }, []);
      useEffect(() => {
        if (submitted) return;
        const id = setInterval(() => setTime((t) => Math.max(t - 1, 0)), 1000);
        return () => clearInterval(id);
      }, [submitted]);

      const score = useMemo(() => {
        const good = quiz.filter((item, i) => answers[i] === item.ok).length;
        return Math.round((good / quiz.length) * 100);
      }, [answers]);

      const filteredProjects = projects.filter((p) =>
        (category === "All" || p.category === category) &&
        (difficulty === "All" || p.difficulty === difficulty)
      );

      const shell = "rounded-[28px] border border-white/60 bg-white/80 p-5 dark:border-slate-700 dark:bg-slate-900/75";
      const fmt = (s) => `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;

      return (
        <div className="mx-auto flex min-h-screen max-w-[1550px]">
          <aside className="glass hidden w-72 shrink-0 border-r border-white/40 px-5 py-6 lg:flex lg:flex-col">
            <div className="mb-8 flex items-center gap-3">
              <div className="flex h-12 w-12 items-center justify-center rounded-2xl bg-gradient-to-br from-brand-500 to-accent-500 text-white">
                <span className="material-symbols-outlined">hub</span>
              </div>
              <div>
                <h1 className="font-heading text-xl font-extrabold">SkillSync AI</h1>
                <p className="text-sm text-slate-600 dark:text-slate-300">Learn -> Test -> Practice -> Earn -> Get Hired</p>
              </div>
            </div>
            <div className="mb-7 rounded-[28px] bg-gradient-to-br from-brand-600 to-accent-500 p-5 text-white">
              <p className="text-xs uppercase tracking-[0.3em] text-white/70">Platform flow</p>
              <p className="mt-3 text-sm text-white/85">An integrated learning and employment ecosystem for students and recruiters.</p>
            </div>
            <div className="space-y-2">
              {nav.map(([id, label, icon]) => (
                <button key={id} onClick={() => setPage(id)} className={`flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left ${page === id ? "bg-slate-900 text-white dark:bg-white dark:text-slate-900" : "hover:bg-white/80 dark:hover:bg-slate-800"}`}>
                  <span className="material-symbols-outlined">{icon}</span>{label}
                </button>
              ))}
            </div>
            <div className="mt-auto rounded-[28px] bg-slate-900 p-4 text-white dark:bg-slate-800">
              <div className="flex items-center justify-between">
                <span className="text-sm">Dark mode</span>
                <button onClick={() => setDark((v) => !v)} className={`relative h-8 w-14 rounded-full ${dark ? "bg-brand-500" : "bg-slate-500/40"}`}>
                  <span className={`absolute top-1 h-6 w-6 rounded-full bg-white transition-all ${dark ? "left-7" : "left-1"}`}></span>
                </button>
              </div>
            </div>
          </aside>

          <main className="flex-1 p-4 sm:p-6">
            <div className="glass min-h-[calc(100vh-2rem)] rounded-[34px] border border-white/50 p-4 shadow-2xl sm:p-6 lg:p-8">
              <div className="mb-5 flex flex-wrap gap-2 lg:hidden">
                {nav.map(([id, label]) => (
                  <button key={id} onClick={() => setPage(id)} className={`rounded-full px-4 py-2 text-sm ${page === id ? "bg-brand-600 text-white" : "bg-white dark:bg-slate-800"}`}>{label}</button>
                ))}
              </div>

              <header className="mb-8 flex flex-col gap-4 border-b border-slate-200/70 pb-6 dark:border-slate-700">
                <p className="text-xs uppercase tracking-[0.3em] text-brand-600 dark:text-brand-300">AI-powered platform demo</p>
                <div className="flex flex-wrap items-center justify-between gap-3">
                  <h2 className="font-heading text-3xl font-extrabold">SkillSync AI</h2>
                  <div className="flex flex-wrap gap-3 text-sm">
                    <div className="rounded-2xl bg-white px-4 py-3 dark:bg-slate-800">User: Aarohi Sharma</div>
                    <div className="rounded-2xl bg-white px-4 py-3 text-brand-700 dark:bg-slate-800 dark:text-brand-300">Job Readiness: 92%</div>
                    <div className="rounded-2xl bg-white px-4 py-3 dark:bg-slate-800">4 Notifications</div>
                  </div>
                </div>
              </header>

              {page === "home" && (
                <div className="space-y-8">
                  <section className="grid gap-6 xl:grid-cols-[1.15fr_.85fr]">
                    <div className="rounded-[30px] bg-slate-900 p-6 text-white md:p-8">
                      <p className="inline-flex rounded-full border border-white/10 bg-white/10 px-4 py-2 text-xs uppercase tracking-[0.28em]">Modern learning ecosystem</p>
                      <h3 className="mt-5 max-w-3xl font-heading text-4xl font-extrabold leading-tight md:text-6xl">Learn, Earn, and Get Hired — All in One Platform</h3>
                      <p className="mt-5 max-w-2xl text-white/75">A hackathon-ready frontend that shows the full user journey from aptitude test to portfolio and direct hiring.</p>
                      <div className="mt-8 flex flex-wrap gap-4">
                        <button onClick={() => setPage("dashboard")} className="rounded-full bg-white px-6 py-3 font-semibold text-slate-900">Get Started</button>
                        <button onClick={() => setPage("tests")} className="rounded-full border border-white/20 bg-white/10 px-6 py-3 font-semibold">Take Aptitude Test</button>
                      </div>
                    </div>
                    <div className={shell}>
                      <p className="text-xs uppercase tracking-[0.3em] text-brand-600 dark:text-brand-300">Story flow</p>
                      <div className="mt-4 space-y-3">
                        {story.map((line) => <div key={line} className={`rounded-2xl px-4 py-3 text-sm ${line === story[flowIndex] ? "bg-gradient-to-r from-brand-600 to-accent-500 text-white" : "bg-slate-50 dark:bg-slate-800"}`}>{line}</div>)}
                      </div>
                    </div>
                  </section>

                  <section className="grid gap-5 lg:grid-cols-5">
                    {[
                      ["Learn","menu_book","Courses and guided content"],
                      ["Test","quiz","Aptitude and skill checks"],
                      ["Practice","exercise","Real company projects"],
                      ["Earn","payments","Budget-based rewards"],
                      ["Hire","handshake","Direct recruiter outreach"]
                    ].map(([t, i, d]) => <div key={t} className={shell}><span className="material-symbols-outlined rounded-2xl bg-brand-50 p-3 text-brand-600 dark:bg-brand-500/20 dark:text-brand-300">{i}</span><h4 className="mt-4 font-heading text-xl font-extrabold">{t}</h4><p className="mt-2 text-sm text-slate-600 dark:text-slate-300">{d}</p></div>)}
                  </section>

                  <section className="grid gap-5 lg:grid-cols-3">
                    {[
                      ["AI Career Guidance","neurology","Suggests ideal paths from aptitude and progress."],
                      ["Project Marketplace","deployed_code","Practice on real briefs and earn rewards."],
                      ["Hiring + Testimonials","workspace_premium","Companies approach strong candidates directly."]
                    ].map(([t, i, d]) => <div key={t} className={shell}><span className="material-symbols-outlined rounded-2xl bg-gradient-to-br from-brand-500 to-accent-500 p-3 text-white">{i}</span><h4 className="mt-4 font-heading text-2xl font-extrabold">{t}</h4><p className="mt-2 text-sm text-slate-600 dark:text-slate-300">{d}</p></div>)}
                  </section>
                </div>
              )}

              {page === "dashboard" && (
                <div className="space-y-6">
                  <section className="grid gap-6 xl:grid-cols-[1.2fr_.8fr]">
                    <div className="rounded-[30px] bg-gradient-to-br from-slate-900 to-brand-700 p-6 text-white">
                      <p className="text-xs uppercase tracking-[0.3em] text-white/60">Welcome back</p>
                      <h3 className="mt-2 font-heading text-4xl font-extrabold">Aarohi, your career engine is moving.</h3>
                      <div className="mt-6 grid gap-4 md:grid-cols-3">
                        {["Skill Progress|74%","Aptitude Score|85/100","Job Readiness|92%"].map((x) => { const [a,b] = x.split("|"); return <div key={a} className="rounded-[24px] bg-white/10 p-4"><p className="text-sm text-white/65">{a}</p><p className="mt-2 font-heading text-3xl font-extrabold">{b}</p></div>; })}
                      </div>
                    </div>
                    <div className={shell}>
                      <p className="text-xs uppercase tracking-[0.3em] text-brand-600 dark:text-brand-300">Recommended career path</p>
                      <h3 className="mt-3 font-heading text-2xl font-extrabold">Product Data Analyst</h3>
                      <p className="mt-3 text-sm text-slate-600 dark:text-slate-300">Best fit from aptitude, communication, and project quality. Suggested next step: SQL sprint + business dashboard project.</p>
                    </div>
                  </section>
                  <section className="grid gap-6 lg:grid-cols-3">
                    <div className={shell}><h3 className="font-heading text-2xl font-extrabold">Suggested Projects</h3><div className="mt-4 space-y-3">{projects.map((p) => <div key={p.title} className="rounded-2xl bg-slate-50 p-4 dark:bg-slate-800"><p className="font-semibold">{p.title}</p><p className="text-sm text-slate-600 dark:text-slate-300">{p.skill} · {p.budget}</p></div>)}</div></div>
                    <div className={shell}><h3 className="font-heading text-2xl font-extrabold">Quick Actions</h3><div className="mt-4 space-y-3">{[["Take Test","tests"],["View Projects","projects"],["Update Profile","profile"]].map(([t,p]) => <button key={t} onClick={() => setPage(p)} className="flex w-full items-center justify-between rounded-2xl bg-slate-50 px-4 py-4 dark:bg-slate-800"><span>{t}</span><span className="material-symbols-outlined">arrow_forward</span></button>)}</div></div>
                    <div className={shell}><h3 className="font-heading text-2xl font-extrabold">Leaderboard</h3><div className="mt-4 space-y-3">{["Aisha 98","Rohan 97","Neha 96","Kabir 95"].map((r, i) => <div key={r} className="flex items-center justify-between rounded-2xl bg-slate-50 p-4 dark:bg-slate-800"><span>#{i+1} {r.split(" ")[0]}</span><span className="font-semibold text-brand-600 dark:text-brand-300">{r.split(" ")[1]}</span></div>)}</div></div>
                  </section>
                </div>
              )}

              {page === "tests" && (
                <div className="space-y-6">
                  {!submitted ? (
                    <section className="grid gap-6 xl:grid-cols-[1fr_.9fr]">
                      <div className={shell}>
                        <div className="flex flex-wrap items-center justify-between gap-3">
                          <div><p className="text-xs uppercase tracking-[0.3em] text-brand-600 dark:text-brand-300">Aptitude test</p><h3 className="mt-2 font-heading text-3xl font-extrabold">Question {qIndex + 1} of {quiz.length}</h3></div>
                          <div className="rounded-2xl bg-brand-50 px-4 py-3 text-brand-700 dark:bg-brand-500/15 dark:text-brand-300">{fmt(time)}</div>
                        </div>
                        <div className="mt-5 h-3 rounded-full bg-slate-100 dark:bg-slate-800"><div className="h-3 rounded-full bg-gradient-to-r from-brand-500 to-accent-500" style={{ width: `${((qIndex + 1) / quiz.length) * 100}%` }}></div></div>
                        <p className="mt-8 text-2xl font-semibold">{quiz[qIndex].q}</p>
                        <div className="mt-5 space-y-3">{quiz[qIndex].a.map((opt, i) => <button key={opt} onClick={() => setAnswers({ ...answers, [qIndex]: i })} className={`flex w-full items-center justify-between rounded-2xl border px-4 py-4 text-left ${answers[qIndex] === i ? "border-brand-500 bg-brand-50 dark:bg-brand-500/15" : "border-slate-200 bg-slate-50 dark:border-slate-700 dark:bg-slate-800"}`}><span>{opt}</span><span className="material-symbols-outlined text-brand-500">{answers[qIndex] === i ? "check_circle" : "radio_button_unchecked"}</span></button>)}</div>
                        <div className="mt-6 flex gap-3">{qIndex < quiz.length - 1 ? <button onClick={() => setQIndex(qIndex + 1)} className="rounded-full bg-brand-600 px-6 py-3 font-semibold text-white">Next Question</button> : <button onClick={() => setSubmitted(true)} className="rounded-full bg-brand-600 px-6 py-3 font-semibold text-white">Submit</button>}</div>
                      </div>
                      <div className="space-y-6">
                        <div className="rounded-[30px] bg-gradient-to-br from-brand-600 to-accent-500 p-6 text-white">
                          <p className="text-xs uppercase tracking-[0.3em] text-white/70">AI Interview Mirror</p>
                          <h3 className="mt-2 font-heading text-3xl font-extrabold">Simulates interview and gives feedback</h3>
                          <div className="mt-5 space-y-3">{["Answers: 8.8/10","Confidence: 8.2/10","Recorded score: 89%"].map((x) => <div key={x} className="rounded-2xl bg-white/12 px-4 py-4">{x}</div>)}</div>
                        </div>
                        <div className={shell}><h3 className="font-heading text-2xl font-extrabold">Readiness signals</h3><div className="mt-4 grid gap-3 sm:grid-cols-3">{["Analytical|89%","Communication|82%","Problem Solving|90%"].map((x) => { const [a,b] = x.split("|"); return <div key={a} className="rounded-2xl bg-slate-50 p-4 dark:bg-slate-800"><p className="text-sm text-slate-600 dark:text-slate-300">{a}</p><p className="mt-2 font-heading text-2xl font-extrabold">{b}</p></div>; })}</div></div>
                      </div>
                    </section>
                  ) : (
                    <section className="grid gap-6 xl:grid-cols-[.95fr_1.05fr]">
                      <div className="rounded-[30px] bg-gradient-to-br from-brand-600 to-accent-500 p-6 text-white">
                        <p className="text-xs uppercase tracking-[0.3em] text-white/70">Aptitude result</p>
                        <h3 className="mt-2 font-heading text-5xl font-extrabold">{score}/100</h3>
                        <p className="mt-4 text-white/80">Suggested career path: Product Data Analyst</p>
                        <button onClick={() => setPage("dashboard")} className="mt-6 rounded-full bg-white px-6 py-3 font-semibold text-slate-900">Start Learning Path</button>
                      </div>
                      <div className="space-y-6">
                        <div className={shell}><h3 className="font-heading text-2xl font-extrabold">Strengths and Weaknesses</h3><div className="mt-4 grid gap-4 md:grid-cols-2"><div className="rounded-2xl bg-emerald-50 p-4 dark:bg-emerald-500/10"><p className="font-semibold text-emerald-700 dark:text-emerald-300">Strengths</p><p className="mt-2 text-sm">Pattern recognition, data reasoning, presentation clarity.</p></div><div className="rounded-2xl bg-amber-50 p-4 dark:bg-amber-500/10"><p className="font-semibold text-amber-700 dark:text-amber-300">Weaknesses</p><p className="mt-2 text-sm">Needs more SQL depth and shorter interview responses.</p></div></div></div>
                        <div className={shell}><h3 className="font-heading text-2xl font-extrabold">Suggested career paths</h3><div className="mt-4 space-y-3">{["Product Data Analyst","Business Intelligence Associate","Growth Analyst"].map((x) => <div key={x} className="rounded-2xl bg-slate-50 px-4 py-4 dark:bg-slate-800">{x}</div>)}</div></div>
                      </div>
                    </section>
                  )}
                </div>
              )}

              {page === "projects" && (
                <div className="space-y-6">
                  <section className={shell}>
                    <div className="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
                      <div><p className="text-xs uppercase tracking-[0.3em] text-brand-600 dark:text-brand-300">Project marketplace</p><h3 className="mt-2 font-heading text-3xl font-extrabold">Pick a real company project</h3></div>
                      <div className="flex flex-wrap gap-3">
                        <select value={category} onChange={(e) => setCategory(e.target.value)} className="rounded-full border border-slate-200 bg-white px-4 py-3 dark:border-slate-700 dark:bg-slate-800">{["All","Frontend","AI","Design"].map((x) => <option key={x}>{x}</option>)}</select>
                        <select value={difficulty} onChange={(e) => setDifficulty(e.target.value)} className="rounded-full border border-slate-200 bg-white px-4 py-3 dark:border-slate-700 dark:bg-slate-800">{["All","Beginner","Intermediate","Advanced"].map((x) => <option key={x}>{x}</option>)}</select>
                      </div>
                    </div>
                    <div className="mt-6 grid gap-5 lg:grid-cols-2">{filteredProjects.map((p) => <div key={p.title} className="rounded-[26px] bg-slate-50 p-5 dark:bg-slate-800"><div className="flex items-start justify-between gap-3"><div><h4 className="font-heading text-2xl font-extrabold">{p.title}</h4><p className="mt-2 text-sm text-slate-600 dark:text-slate-300">{p.desc}</p></div><span className="rounded-full bg-brand-600 px-3 py-1 text-xs font-semibold text-white">{p.budget}</span></div><div className="mt-4 flex flex-wrap gap-2"><span className="rounded-full bg-brand-100 px-3 py-1 text-xs font-semibold text-brand-700 dark:bg-brand-500/20 dark:text-brand-300">{p.skill}</span><span className="rounded-full bg-slate-200 px-3 py-1 text-xs dark:bg-slate-700">{p.difficulty}</span></div><button className="mt-5 rounded-full bg-slate-900 px-5 py-3 font-semibold text-white dark:bg-white dark:text-slate-900">Apply</button></div>)}</div>
                  </section>
                  <section className="grid gap-6 xl:grid-cols-[.95fr_1.05fr]">
                    <div className="rounded-[30px] bg-gradient-to-br from-brand-600 to-brand-800 p-6 text-white">
                      <p className="text-xs uppercase tracking-[0.3em] text-white/70">Project submission</p>
                      <div className="mt-5 rounded-[24px] border border-dashed border-white/30 bg-white/10 p-5">Upload file or paste repository link</div>
                      <textarea rows="6" className="mt-4 w-full rounded-[24px] border border-white/15 bg-white/10 p-4 placeholder:text-white/55 focus:outline-none" placeholder="Explain your approach, outcome, and what you learned."></textarea>
                      <div className="mt-4 flex flex-wrap gap-3"><button className="rounded-full bg-white px-6 py-3 font-semibold text-slate-900">Submit</button><span className="rounded-full bg-amber-300/20 px-4 py-3 text-sm">Status: Pending</span></div>
                    </div>
                    <div className={shell}><h3 className="font-heading text-2xl font-extrabold">Status board</h3><div className="mt-5 grid gap-4 sm:grid-cols-3">{["Pending|2","In Review|1","Completed|6"].map((x) => { const [a,b] = x.split("|"); return <div key={a} className="rounded-2xl bg-slate-50 p-5 text-center dark:bg-slate-800"><p className="text-sm text-slate-600 dark:text-slate-300">{a}</p><p className="mt-2 font-heading text-3xl font-extrabold">{b}</p></div>; })}</div></div>
                  </section>
                </div>
              )}

              {page === "jobs" && (
                <div className="space-y-6">
                  <section className="grid gap-6 xl:grid-cols-[1fr_.9fr]">
                    <div className={shell}>
                      <p className="text-xs uppercase tracking-[0.3em] text-brand-600 dark:text-brand-300">Hiring page</p>
                      <h3 className="mt-2 font-heading text-3xl font-extrabold">AI-matched job opportunities</h3>
                      <div className="mt-5 space-y-4">{jobs.map((job) => <div key={job.title} className="rounded-[24px] bg-slate-50 p-5 dark:bg-slate-800"><div className="flex flex-col gap-4 md:flex-row md:items-center md:justify-between"><div><p className="font-heading text-2xl font-extrabold">{job.title}</p><p className="text-sm text-slate-600 dark:text-slate-300">{job.company}</p></div><div className="flex items-center gap-3"><span className="rounded-full bg-brand-100 px-3 py-2 text-sm font-semibold text-brand-700 dark:bg-brand-500/20 dark:text-brand-300">{job.match}% match</span><button className="rounded-full bg-brand-600 px-5 py-3 font-semibold text-white">Apply</button></div></div></div>)}</div>
                    </div>
                    <div className="space-y-6">
                      <div className="rounded-[30px] bg-gradient-to-br from-accent-500 to-brand-600 p-6 text-white">
                        <p className="text-xs uppercase tracking-[0.3em] text-white/70">Reverse hiring model</p>
                        <h3 className="mt-2 font-heading text-3xl font-extrabold">Top 10 candidates this week</h3>
                        <div className="mt-5 space-y-3">{["Aisha 98","Rohan 97","Neha 96","Kabir 95","Sana 95"].map((x, i) => <div key={x} className="flex items-center justify-between rounded-2xl bg-white/12 px-4 py-4"><span>#{i+1} {x.split(" ")[0]}</span><span>{x.split(" ")[1]}</span></div>)}</div>
                      </div>
                      <div className={shell}><p className="text-xs uppercase tracking-[0.3em] text-brand-600 dark:text-brand-300">Career Simulation Mode</p><h3 className="mt-2 font-heading text-2xl font-extrabold">Try a job before choosing it</h3><div className="mt-4 space-y-3">{["Day as a Data Analyst","Day as a Frontend Engineer","Day as a Product Operations Associate"].map((x) => <div key={x} className="flex items-center justify-between rounded-2xl bg-slate-50 px-4 py-4 dark:bg-slate-800"><span>{x}</span><button className="rounded-full bg-slate-900 px-4 py-2 text-sm text-white dark:bg-white dark:text-slate-900">Launch</button></div>)}</div></div>
                    </div>
                  </section>
                </div>
              )}

              {page === "profile" && (
                <div className="space-y-6">
                  <section className="grid gap-6 xl:grid-cols-[.9fr_1.1fr]">
                    <div className="rounded-[30px] bg-gradient-to-br from-slate-900 to-brand-700 p-6 text-white">
                      <div className="flex items-center gap-4"><div className="flex h-20 w-20 items-center justify-center rounded-[24px] bg-white/10 text-3xl font-extrabold">AS</div><div><h3 className="font-heading text-3xl font-extrabold">Aarohi Sharma</h3><p className="text-white/75">Product Data Analyst Path</p></div></div>
                      <div className="mt-5 flex flex-wrap gap-2">{["SQL","React","Dashboarding","Communication","Problem Solving"].map((x) => <span key={x} className="rounded-full bg-white/12 px-4 py-2 text-sm">{x}</span>)}</div>
                      <button className="mt-7 rounded-full bg-white px-6 py-3 font-semibold text-slate-900">Hire Me</button>
                    </div>
                    <div className={shell}><p className="text-xs uppercase tracking-[0.3em] text-brand-600 dark:text-brand-300">Portfolio page</p><h3 className="mt-2 font-heading text-3xl font-extrabold">Completed projects</h3><div className="mt-5 space-y-3">{["Revenue Dashboard","User Research Synthesis","Campaign Performance Model"].map((x) => <div key={x} className="rounded-2xl bg-slate-50 px-4 py-4 dark:bg-slate-800">{x}</div>)}</div></div>
                  </section>
                  <section className="grid gap-6 lg:grid-cols-2">
                    <div className={shell}><h3 className="font-heading text-2xl font-extrabold">Certificates</h3><div className="mt-4 space-y-3">{["Foundations of Data Analytics","Frontend Product Thinking","AI Interview Readiness"].map((x) => <div key={x} className="rounded-2xl bg-slate-50 px-4 py-4 dark:bg-slate-800">{x}</div>)}</div></div>
                    <div className={shell}><h3 className="font-heading text-2xl font-extrabold">Auto-built portfolio</h3><p className="mt-3 text-sm text-slate-600 dark:text-slate-300">Completed projects, certificates, scores, and hiring signals are automatically shaped into a recruiter-ready profile.</p><div className="mt-5 grid gap-4 sm:grid-cols-2"><div className="rounded-2xl bg-slate-50 p-4 dark:bg-slate-800"><p className="text-sm text-slate-600 dark:text-slate-300">Views</p><p className="mt-2 font-heading text-3xl font-extrabold">187</p></div><div className="rounded-2xl bg-slate-50 p-4 dark:bg-slate-800"><p className="text-sm text-slate-600 dark:text-slate-300">Recruiter saves</p><p className="mt-2 font-heading text-3xl font-extrabold">26</p></div></div></div>
                  </section>
                </div>
              )}

              <footer className="mt-10 border-t border-slate-200/70 pt-6 text-sm text-slate-600 dark:border-slate-700 dark:text-slate-300">
                <div className="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
                  <div><p className="font-heading text-lg font-extrabold text-slate-900 dark:text-white">SkillSync AI</p><p>Hackathon-ready frontend for an integrated learning and employment ecosystem.</p></div>
                  <div className="flex flex-wrap gap-4"><a href="#">About</a><a href="#">Projects</a><a href="#">Jobs</a><a href="#">Privacy</a><a href="#">Contact</a></div>
                </div>
              </footer>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
